[tool.ruff]
line-length = 100
target-version = "py310"

[tool.ruff.lint]
select = [
    "E", "F", "W",     # pycodestyle / pyflakes
    "I",               # isort
    "B",               # bugbear
    "UP",              # pyupgrade
    "SIM",             # flake8-simplify
    "RUF",             # ruff-specific
]
ignore = [
    "E501",            # line length is enforced by formatter, not linter
]

[tool.ruff.lint.per-file-ignores]
"tests/*" = ["S101"]   # assertions are fine in tests

[tool.ruff.lint.isort]
known-first-party = ["_common"]

[tool.mypy]
python_version = "3.10"
warn_return_any = true
warn_unused_ignores = true
ignore_missing_imports = true   # boto3 stubs aren't installed by default

[tool.pytest.ini_options]
testpaths = ["tests"]
addopts = "-ra -q"
