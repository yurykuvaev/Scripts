name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
          pip install ruff mypy pytest

      - name: Lint with ruff
        run: ruff check .

      - name: Type-check with mypy
        run: mypy --explicit-package-bases _common.py
        continue-on-error: true   # mypy is informational while we tighten types

      - name: Run pytest
        run: pytest
